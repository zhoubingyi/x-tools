<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Tools</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="xt-popup">
    <div class="xt-popup-inner">
      <header class="xt-popup-header">
        <h1>X Tools</h1>
        <span class="sub">实时流速 · 热帖排行</span>
      </header>

      <div class="xt-tabbar" role="tablist">
        <button class="xt-tab-btn" role="tab" aria-selected="true" data-tab="leaderboard">排行榜</button>
        <button class="xt-tab-btn" role="tab" aria-selected="false" data-tab="about">关于</button>
      </div>

      <!-- Leaderboard panel -->
      <div class="xt-panel" data-panel="leaderboard" data-active="1">
        <div class="xt-card">
          <h3>流速排行榜</h3>
          <div class="xt-toggle-row">
            <span>显示排行榜</span>
            <label class="xt-switch">
              <input type="checkbox" data-key="leaderboardEnabled" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="xt-field">
            <label>显示条数</label>
            <input type="number" data-key="leaderboardCount" min="3" max="30" step="1" value="10">
          </div>
        </div>
        <div class="xt-card">
          <h3>评分阈值</h3>
          <div class="xt-info-box">
            <div class="tier"><span class="icon">🌱</span><span class="label">普通</span><span class="range">&lt; 流速阈值</span></div>
            <div class="tier"><span class="icon">🚀</span><span class="label">热门</span><span class="range">≥ trending /h</span></div>
            <div class="tier"><span class="icon">🔥</span><span class="label">爆帖</span><span class="range">≥ viral /h</span></div>
          </div>
          <div class="xt-field">
            <label>热门阈值 / h</label>
            <input type="number" data-key="trendingThreshold" min="1" step="100" value="1000">
          </div>
          <div class="xt-field">
            <label>爆帖阈值 / h</label>
            <input type="number" data-key="viralThreshold" min="1" step="100" value="10000">
          </div>
        </div>
        <div class="xt-card">
          <h3>附加功能</h3>
          <div class="xt-toggle-row">
            <span>显示书签数</span>
            <label class="xt-switch">
              <input type="checkbox" data-key="showBookmarkCount" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="xt-toggle-row">
            <span>Markdown 复制</span>
            <label class="xt-switch">
              <input type="checkbox" data-key="copyMarkdownEnabled" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="xt-toggle-row">
            <span>双击图片查看原图</span>
            <label class="xt-switch">
              <input type="checkbox" data-key="imageViewerEnabled" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="xt-toggle-row">
            <span>媒体下载按钮</span>
            <label class="xt-switch">
              <input type="checkbox" data-key="mediaDownloadEnabled" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="xt-toggle-row">
            <span>保存下载记录</span>
            <label class="xt-switch">
              <input type="checkbox" data-key="mediaSaveHistory" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="xt-field">
            <label>媒体文件名模板</label>
            <textarea data-key="mediaFilenamePattern" rows="3">twitter_{user-name}(@{user-id})_{date-time}_{status-id}_{file-type}</textarea>
          </div>
          <div class="xt-actions xt-actions--split">
            <button type="button" class="xt-btn" id="export-history">导出下载记录</button>
            <button type="button" class="xt-btn" id="clear-history">清除记录</button>
          </div>
        </div>
      </div>

      <!-- About panel -->
      <div class="xt-panel" data-panel="about">
        <div class="xt-card">
          <h3>X Tools</h3>
          <p style="font-size:12px;color:var(--xt-text-2);line-height:1.6;">
            实时流速徽章、热帖排行榜、媒体下载、书签数和 Markdown 复制。<br>
            本地运行，无需登录或 license。
          </p>
        </div>
      </div>

      <div class="xt-actions">
        <button type="button" class="xt-btn" id="reset">恢复默认</button>
      </div>
      <div class="xt-status" id="status"></div>
      <div class="xt-footer">X Tools v1.0.0</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
